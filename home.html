<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - Home</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

<nav class="sidebar">
    <div class="user-info">
        <small>Bem-vindo(a),</small>
        <span class="user-name">USUARIO</span>
    </div>

    <div class="menu-item active" onclick="carregar('cliente' , event)">Clientes</div>
    <div class="menu-item" onclick="carregar('produtos' , event)">Produtos</div>
    <div class="menu-item" onclick="carregar('financeiro', event)">Financeiro</div>

    <div class="menu-item seta" onclick="toggleSubmenu('sub-cadastros')">Cadastros Auxiliares</div>
    <div class="submenu" id="sub-cadastros">
        <div class="submenu-item" onclick="carregar('marca', event)">Marca</div>
        <div class="submenu-item" onclick="carregar('cor', event)">Cor</div>
        <div class="submenu-item" onclick="carregar('tamanho', event)">Tamanho</div>
        <div class="submenu-item" onclick="carregar('lojas', event)">Lojas</div>
        <div class="submenu-item" onclick="carregar('cartoes', event)">Cartões</div>
        <div class="submenu-item" onclick="carregar('bandeiras', event)">Bandeiras</div>
    </div>

    <div class="menu-item seta" onclick="toggleSubmenu('sub-relatorios', event)">Relatórios</div>
    <div class="submenu" id="sub-relatorios">
        <div class="submenu-item" onclick="carregar('relatorio1', event)">Relatório 1</div>
        <div class="submenu-item" onclick="carregar('relatorio2', event)">Relatório 2</div>
        <div class="submenu-item" onclick="carregar('relatorio3', event)">Relatório 3</div>
    </div>

    <div class="menu-item" onclick="carregar('espaco', event)">Espaço Vazio</div>
</nav>

<div class="main-container">
    <header class="top-bar">
        <a href="/logout" class="btn-logout">Sair do Sistema</a>
    </header>

    <main class="content-area">
        <div class="card-sistema">
            <!--<h1 class="titulo-principal" id="label-titulo">Clientes 3</h1>-->
            <div id="container-dinamico">
                <iframe id="frame-conteudo" src="paginas/CadCliente.html"></iframe>
            </div>
        </div>
    </main>
</div>
<script src="js/abreMenus.js"></script>
</body>
</html>
