<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
<div class="container-cadastro">
    <h1 class="titulo-principal">Produtos</h1>
    <h2 class="subtitulo-azul">Cadastro de Produtos</h2> 

    <form class="grid-formulario">
        <div class="grupo-campo campo-codigo">
            <label><span class="obrigatorio">*</span> Código:</label>
            <input type="text" name="codigo_produto">
        </div>
        <div class="grupo-campo campo-nome">
            <label>Nome do Produto:</label>
            <input type="text" name="nome_produto">
        </div>
        <div class="grupo-campo campo-marca">
            <label>Marca:</label>
            <select name="marca">
                <option value="">Selecione...</option>
                </select>
        </div>

        <div class="grupo-campo campo-tamanho">
            <label>Tamanho:</label>
            <select name="tamanho">
                <option value="">Selecione...</option>
                </select>
        </div>
        <div class="grupo-campo campo-cor">
            <label>Cor:</label>
            <select name="cor">
                <option value="">Selecione...</option>
                </select>
        </div>
        <div class="grupo-campo campo-loja">
            <label>Loja:</label>
            <select name="loja">
                <option value="">Selecione...</option>
                </select>
        </div>

        <div class="grupo-campo campo-config">
            <label>Configuração (Máx. 100 caracteres):</label>
            <input type="text" name="configuracao" maxlength="100" placeholder="Detalhes técnicos rápidos">
        </div>
    </form>

    <div class="area-botoes">
        <button type="button" class="btn btn-incluir">Incluir</button>
        <button type="button" class="btn btn-salvar">Salvar</button>
        <button type="button" class="btn btn-consultar">Consultar</button>
        <button type="button" class="btn btn-voltar">Voltar</button>
    </div>
</div>

</body>
</html>
