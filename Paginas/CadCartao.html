<body>

<div class="container-cadastro">
    <h1 class="titulo-principal">Gestão Financeira</h1>
    <h2 class="subtitulo-azul">Cadastro de Cartão</h2>

    <form class="grid-formulario">
        <div class="grupo-campo campo-codigo">
            <label><span class="obrigatorio">*</span> Código:</label>
            <input type="text" name="codigo_cartao">
        </div>
        
        <div class="grupo-campo campo-nome">
            <label>Nome do Cartão (Apelido):</label>
            <input type="text" name="nome_cartao" placeholder="Ex: Nubank Pessoal">
        </div>

        <div class="grupo-campo campo-bandeira">
            <label>Bandeira:</label>
            <select name="bandeira">
                <option value="">Selecione...</option>
                <option value="MASTERCARD">Mastercard</option>
                <option value="VISA">Visa</option>
                <option value="ELO">Elo</option>
                <option value="AMEX">American Express</option>
            </select>
        </div>

        <div class="grupo-campo campo-limite">
            <label>Limite Total:</label>
            <input type="number" step="0.01" name="limite_total" placeholder="0,00">
        </div>

        <div class="grupo-campo campo-limite">
            <label>Limite Disponível:</label>
            <input type="number" step="0.01" name="limite_disponivel" placeholder="0,00">
        </div>

        <div class="grupo-campo campo-validade">
            <label>Validade:</label>
            <input type="date" name="validade">
        </div>
    </form>

    <div class="area-botoes">
        <button type="button" class="btn btn-incluir">Incluir</button>
        <button type="button" class="btn btn-salvar">Salvar</button>
        <button type="button" class="btn btn-voltar">Voltar</button>
    </div>
</div>

</body>
</html>
