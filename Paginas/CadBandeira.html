<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Bandeiras dos Cartões</title>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>
<div class="container-cadastro">
    <h1 class="titulo-principal">Cadastros Auxiliares</h1>
    <h2 class="subtitulo-azul">Cadastro de Bandeiras</h2>

    <form class="grid-formulario">
        <div class="grupo-campo campo-codigo">
            <label><span class="obrigatorio">*</span> Código:</label>
            <input type="text" name="codigo_bandeira">
        </div>
        
        <div class="grupo-campo campo-nome">
            <label>Nome da Bandeira:</label>
            <input type="text" name="nome_bandeira">
        </div>
    </form>

    <div class="estilo-botoes">
        <button type="button" class="btn btn-incluir">Incluir</button>
        <button type="button" class="btn btn-salvar">Salvar</button>
        <button type="button" class="btn btn-excluir">Excluir</button>
        <button type="button" class="btn btn-voltar">Voltar</button>
    </div>
</div>

</body>
</html>
