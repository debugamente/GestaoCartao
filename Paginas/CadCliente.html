<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes 2</title>
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body>

<div class="container-cadastro">
    <h1 class="titulo-principal">Cadastro</h1>
    <h2 class="subtitulo-azul">Cadastro de Clientes</h2>

    <form class="grid-formulario">
        <div class="grupo-campo campo-codigo">
            <label><span class="obrigatorio">*</span> Código:</label>
            <input type="text" name="codigo_cliente">
        </div>

        <div class="grupo-campo campo-nome">
            <label>Nome Cliente:</label>
            <input type="text" name="nome_cliente">
        </div>
    </form>

    <div class="area-botoes">
        <button type="button" class="btn btn-incluir">Incluir</button>
        <button type="button" class="btn btn-salvar">Salvar</button>
		<button type="button" class="btn btn-consultar">Consultar</button>
		<button type="button" class="btn btn-voltar">Voltar</button>
    </div>
</div>

</body>
</html>
